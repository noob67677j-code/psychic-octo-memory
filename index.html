<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; }
        .btn { padding: 20px; background: #0088cc; color: white; border-radius: 10px; margin: 10px; display: block; }
    </style>
</head>
<body>
    <h1>Твой Гараж</h1>
    <div id="balance">Баланс: 0 ₽</div>
    <div class="btn" onclick="upgrade()">Улучшить станок (+10₽)</div>
    
    <script>
        let balance = 0;
        function upgrade() {
            balance += 10;
            document.getElementById('balance').innerText = "Баланс: " + balance + " ₽";
            Telegram.WebApp.MainButton.setText("Закрыть и сохранить");
            Telegram.WebApp.MainButton.show();
        }
    </script>
</body>
</html>
