<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quantum Clicker</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Базовые стили для адаптивности в Telegram */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0a0d;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Шапка с балансом */
        .header {
            text-align: center;
            padding: 25px 15px 15px 15px;
            background: linear-gradient(180deg, rgba(31,27,43,0.5) 0%, rgba(11,10,13,0) 100%);
        }

        .balance-title {
            font-size: 14px;
            color: #818085;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 800;
            color: #4caf50;
            text-shadow: 0 0 15px rgba(76,175,80,0.3);
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            font-size: 12px;
            color: #a1a0a5;
        }

        /* Контентная зона вкладок */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 90px; /* Чтобы контент не залезал под нижнее меню */
        }

        .tab-content {
            display: none;
            height: 100%;
        }

        /* ВКЛАДКА: ИГРА (КЛИКЕР) */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 280px;
        }

        .click-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #2a1f42 0%, #171226 100%);
            border: 4px solid #7b52ff;
            box-shadow: 0 0 30px rgba(123,82,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.05s ease;
        }

        .click-circle:active {
            transform: scale(0.95);
            border-color: #9d7cff;
            box-shadow: 0 0 40px rgba(123,82,255,0.4);
        }

        .click-circle img {
            width: 60%;
            pointer-events: none;
        }

        /* Анимация всплывающих цифр +X ₽ */
        .click-animation {
            position: absolute;
            font-size: 22px;
            font-weight: 800;
            color: #4caf50;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 0 0 8px rgba(0,0,0,0.6);
            z-index: 1000;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0.8); opacity: 0; }
        }

        /* Общие кнопки действий (Престиж, Сейв) */
        .action-btn {
            background: #2d2c30;
            color: white;
            border: 1px solid #444;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
        }
        .action-btn.shards-btn {
            background: linear-gradient(90deg, #673ab7 0%, #9c27b0 100%);
            border: none;
        }

        /* НИЖНЯЯ НАВИГАЦИЯ */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background-color: #121115;
            border-top: 1px solid #232227;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            z-index: 100;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: #616065;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            flex: 1;
        }

        .nav-btn.active {
            color: #7b52ff;
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* Кастомизация скроллбара для красивого вида списков */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d2c30;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-title">Ваш баланс</div>
        <div class="balance-amount" id="balanceDisplay">0 ₽</div>
        <div class="stats-row">
            <span id="clickPowerDisplay">Клик: +1 ₽</span>
            <span id="passivePowerDisplay">Пассив: +0 ₽/с</span>
        </div>
        <div id="shardsDisplay" style="font-size: 11px; color: #9c27b0; margin-top: 5px; font-weight: bold;">Осколки: 0 (+0%)</div>
    </div>

    <div class="content-area">
        
        <div id="gameTab" class="tab-content">
            <div class="game-container">
                <div class="click-circle" onclick="handleTap(event)">
                    <span style="font-size: 64px;">💎</span>
                </div>
                
                <button class="action-btn shards-btn" onclick="buyShard()">Купить осколок (1 000 000 ₽)</button>
                <button class="action-btn" onclick="saveGameData(true)">Сохранить прогресс вручную</button>
            </div>
        </div>

        <div id="upgradesTab" class="tab-content">
            <h3 style="margin-bottom: 15px; font-size: 18px;">Доступные апгрейды</h3>
            <div id="upgradesContainer">
                </div>
        </div>

        <div id="leaderboardTab" class="tab-content">
            <h3 style="margin-bottom: 15px; font-size: 18px;">Топ-20 Богачей (Firebase Live)</h3>
            <div id="leaderboardContainer">
                <div style="color: #919094; margin-top: 20px;">Загрузка списка лидеров...</div>
            </div>
        </div>

    </div>

    <div class="nav-bar">
        <button class="nav-btn active" id="btn-game" onclick="switchTab('game')">
            <div class="nav-icon">🎮</div>
            <div>Игра</div>
        </button>
        <button class="nav-btn" id="btn-upgrades" onclick="switchTab('upgrades')">
            <div class="nav-icon">⚡</div>
            <div>Улучшения</div>
        </button>
        <button class="nav-btn" id="btn-leaderboard" onclick="switchTab('leaderboard')">
            <div class="nav-icon">🏆</div>
            <div>Лидеры</div>
        </button>
    </div>

    <script>
        // ==========================================
        // 1. ИНИЦИАЛИЗАЦИЯ FIREBASE (ВСТАВЬ СВОИ КЛЮЧИ!)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAihhgVxq3rp4uGS7XsxAhcOB-XCU5hJ4s",
            authDomain: "https://quanta-1750d.firebaseapp.com",
            databaseURL: "https://quanta-1750d-default-rtdb.firebaseio.com",
            projectId: "quanta-1750d",
            storageBucket: "https://quanta-1750d.firebasestorage.app",
            messagingSenderId: "368460200385",
            appId: "1:368460200385:web:4f4ba6f63b89788d491740"
        };

        // Запуск Firebase базы данных
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Считываем контейнер WebApp Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Конфигурация параметров апгрейда
        const upgradeConfig = {
            click_1: { name: "Деревянный кликер", power: 1, cost: 10 },
            click_2: { name: "Железный курсор", power: 5, cost: 100 },
            passive_1: { name: "Маленький майнер", power: 1, cost: 50 },
            passive_2: { name: "Квантовая ферма", power: 10, cost: 500 }
        };

        // Модель сохранения данных
        let gameState = {
            balance: 0,
            shards: 0,
            lastSaveTime: Date.now(),
            upgrades: { click_1: 0, click_2: 0, passive_1: 0, passive_2: 0 }
        };

        let currentActiveTab = 'game';

        // Формула вычисления стоимости уровня
        function getUpgradeCost(type, level) {
            return Math.floor(upgradeConfig[type].cost * Math.pow(1.5, level));
        }

        // ==========================================
        // 2. СИНХРОНИЗАЦИЯ И ИНИЦИАЛИЗАЦИЯ ДАННЫХ ИГРОКА
        // ==========================================
        function initGameData() {
            const userId = tg.initDataUnsafe?.user?.id || 12345;
            
            // Шаг А: Быстро грузим локальную память, чтобы игра не висела "белой"
            const localSave = localStorage.getItem(`quantum_save_${userId}`);
            if (localSave) {
                try { gameState = JSON.parse(localSave); } catch(e) { console.error(e); }
            }
            updateUI();

            // Шаг Б: Скачиваем свежий бэкап из Firebase
            db.ref('users/' + userId).once('value')
            .then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.save) {
                        gameState = data.save;
                    }
                    
                    // Расчет оффлайн дохода
                    const now = Date.now();
                    const secondsOffline = Math.floor((now - (gameState.lastSaveTime || now)) / 1000);
                    if (secondsOffline > 15) {
                        let multiplier = 1 + ((gameState.shards || 0) * 0.10);
                        let basePassive = ((gameState.upgrades.passive_1 || 0) * upgradeConfig.passive_1.power) + ((gameState.upgrades.passive_2 || 0) * upgradeConfig.passive_2.power);
                        let offlineEarnings = secondsOffline * (basePassive * multiplier);
                        if (offlineEarnings > 0) {
                            gameState.balance += offlineEarnings;
                            alert(`Пассивный доход за время отсутствия: +${Math.floor(offlineEarnings).toLocaleString('ru-RU')} ₽`);
                        }
                    }
                    updateUI();
                    if (currentActiveTab === 'upgrades') renderUpgrades();
                }
            })
            .catch(err => console.log("Работаем в автономном режиме (Firebase offline):", err));

            // Сразу запускаем постоянный слушатель лидерборда
            initLiveLeaderboard();
        }

        // ==========================================
        // 3. ЖИВОЙ ЛИДЕРБОРД (БЕЗ ПЕРЕЗАГРУЗОК)
        // ==========================================
        function initLiveLeaderboard() {
            // Запрашиваем 20 записей с максимальным балансом. Firebase сам пришлет обновление, если кто-то кликнет!
            db.ref('users').orderByChild('balance').limitToLast(20).on('value', (snapshot) => {
                let players = [];
                snapshot.forEach((childSnapshot) => {
                    players.push(childSnapshot.val());
                });
                
                // Переворачиваем массив, так как Firebase присылает снизу вверх
                players.reverse();
                
                const container = document.getElementById('leaderboardContainer');
                if (!container) return;
                
                let html = "";
                players.forEach((player, index) => {
                    let rankColor = index === 0 ? "#ffca28" : (index === 1 ? "#b0bec5" : (index === 2 ? "#bcaaa4" : "#fff"));
                    let pName = player.username || "Игрок";
                    let pBalance = player.balance || 0;
                    
                    html += `
                        <div class="leader-item" style="display: flex; justify-content: space-between; padding: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.02); border-radius: 10px; border: 1px solid #232227;">
                            <div style="display: flex; gap: 12px; align-items: center;">
                                <span style="color: ${rankColor}; font-weight: 800; font-size: 14px;">#${index + 1}</span>
                                <span style="color: #fff; font-size: 14px;">${pName}</span>
                            </div>
                            <span style="color: #4caf50; font-weight: bold; font-size: 14px;">${Math.floor(pBalance).toLocaleString('ru-RU')} ₽</span>
                        </div>
                    `;
                });
                container.innerHTML = html;
            });
        }

        // ==========================================
        // 4. ФУНКЦИЯ СОХРАНЕНИЯ ПРОГРЕССА
        // ==========================================
        function saveGameData(isManual = false) {
            const userId = tg.initDataUnsafe?.user?.id || 12345;
            const username = tg.initDataUnsafe?.user?.first_name || "Игрок";
            
            gameState.lastSaveTime = Date.now();
            localStorage.setItem(`quantum_save_${userId}`, JSON.stringify(gameState));
            
            // Пишем в Firebase. Поле баланса выносим на верхний уровень для удобной индексации топа
            db.ref('users/' + userId).set({
                username: username,
                balance: Math.floor(gameState.balance),
                save: gameState
            })
            .then(() => {
                if (isManual) alert("Прогресс успешно зафиксирован в облаке Firebase!");
            })
            .catch(e => console.error("Ошибка синхронизации:", e));
        }

        // ==========================================
        // 5. ИГРОВЫЕ МЕХАНИКИ (КЛИК, АПГРЕЙДЫ, ПРЕСТИЖ)
        // ==========================================
        function handleTap(event) {
            let clickPower = 1 + ((gameState.upgrades.click_1 || 0) * upgradeConfig.click_1.power) + ((gameState.upgrades.click_2 || 0) * upgradeConfig.click_2.power);
            let multiplier = 1 + ((gameState.shards || 0) * 0.10);
            let totalClick = clickPower * multiplier;
            
            gameState.balance += totalClick;
            updateUI();

            // Создание красивых всплывающих циферок под пальцем
            if (event && event.clientX) {
                const clickText = document.createElement('div');
                clickText.innerText = `+${Math.floor(totalClick)} ₽`;
                clickText.className = 'click-animation';
                clickText.style.left = `${event.clientX}px`;
                clickText.style.top = `${event.clientY}px`;
                document.body.appendChild(clickText);
                setTimeout(() => { clickText.remove(); }, 800);
            }
        }

        function buyUpgrade(type) {
            let currentLevel = gameState.upgrades[type] || 0;
            let currentCost = getUpgradeCost(type, currentLevel);
            
            if (gameState.balance >= currentCost) {
                gameState.balance -= currentCost;
                gameState.upgrades[type] = currentLevel + 1;
                updateUI();
                renderUpgrades();
            } else {
                alert("Недостаточно денег для апгрейда!");
            }
        }

        function buyShard() {
            if (gameState.balance >= 1000000) {
                gameState.balance -= 1000000;
                gameState.shards = (gameState.shards || 0) + 1;
                alert("Ура! Осколок Квантума ваш! Множитель кликов и пассивки вырос на +10%.");
                updateUI();
            } else {
                alert("Вам необходимо накопить 1 000 000 ₽!");
            }
        }

        // Перерисовка текстов
        function updateUI() {
            const balanceEl = document.getElementById('balanceDisplay');
            if (balanceEl) balanceEl.innerText = Math.floor(gameState.balance).toLocaleString('ru-RU') + " ₽";
            
            let clickPower = 1 + ((gameState.upgrades.click_1 || 0) * upgradeConfig.click_1.power) + ((gameState.upgrades.click_2 || 0) * upgradeConfig.click_2.power);
            let basePassive = ((gameState.upgrades.passive_1 || 0) * upgradeConfig.passive_1.power) + ((gameState.upgrades.passive_2 || 0) * upgradeConfig.passive_2.power);
            let multiplier = 1 + ((gameState.shards || 0) * 0.10);

            const clickPowerEl = document.getElementById('clickPowerDisplay');
            if (clickPowerEl) clickPowerEl.innerText = `Клик: +${(clickPower * multiplier).toFixed(0)} ₽`;

            const passivePowerEl = document.getElementById('passivePowerDisplay');
            if (passivePowerEl) passivePowerEl.innerText = `Пассив: +${(basePassive * multiplier).toFixed(1)} ₽/с`;

            const shardsEl = document.getElementById('shardsDisplay');
            if (shardsEl) shardsEl.innerText = `Осколки: ${gameState.shards || 0} (Буст: +${((gameState.shards || 0) * 10)}%)`;
        }

        // Рендер кнопок во вкладке магазинов
        function renderUpgrades() {
            const container = document.getElementById('upgradesContainer');
            if (!container) return;
            
            let html = "";
            Object.keys(upgradeConfig).forEach(type => {
                let level = gameState.upgrades[type] || 0;
                let cost = getUpgradeCost(type, level);
                let config = upgradeConfig[type];
                let typeText = type.startsWith('click') ? "к клику" : "в сек";
                
                html += `
                    <div class="upgrade-item" style="display: flex; justify-content: space-between; align-items: center; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.02); border: 1px solid #232227; border-radius: 12px;">
                        <div>
                            <div style="font-weight: bold; color: #fff; font-size: 15px;">${config.name} <span style="color: #7b52ff; font-size: 13px;">[Ур. ${level}]</span></div>
                            <div style="font-size: 12px; color: #818085; margin-top: 2px;">+${config.power} ${typeText}</div>
                        </div>
                        <button style="background: #4caf50; color: #fff; border: none; padding: 10px 16px; border-radius: 8px; font-weight: bold; font-size: 13px;" onclick="buyUpgrade('${type}')">
                            ${cost.toLocaleString('ru-RU')} ₽
                        </button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Переключение между вкладками меню
        function switchTab(tabId) {
            currentActiveTab = tabId;
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            
            const targetTab = document.getElementById(`${tabId}Tab`);
            if (targetTab) targetTab.style.display = 'block';
            
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${tabId}`);
            if (activeBtn) activeBtn.classList.add('active');
            
            if (tabId === 'upgrades') renderUpgrades();
        }

        // ==========================================
        // 6. ТАЙМЕРЫ АВТО-РАБОТЫ
        // ==========================================
        
        // Каждую секунду начисляем пассивный доход
        setInterval(() => {
            let basePassive = ((gameState.upgrades.passive_1 || 0) * upgradeConfig.passive_1.power) + ((gameState.upgrades.passive_2 || 0) * upgradeConfig.passive_2.power);
            let multiplier = 1 + ((gameState.shards || 0) * 0.10);
            if (basePassive > 0) {
                gameState.balance += (basePassive * multiplier);
                updateUI();
            }
        }, 1000);

        // Каждые 20 секунд незаметно сохраняем прогресс в Firebase
        setInterval(() => { saveGameData(false); }, 20000);

        // Автозапуск при входе
        window.onload = function() {
            initGameData();
            switchTab('game');
        };
    </script>
</body>
</html>
